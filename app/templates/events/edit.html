{% extends "base.html" %}

{% block title %}Edit Event — Campus Event Finder{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Edit Event</h1>
</div>

<div class="card">
  <form method="POST" action="{{ url_for('main.event_edit', id=event._id) }}">
    <div class="form-group">
      <label for="title">Title *</label>
      <input type="text" id="title" name="title" required
             value="{{ event.title }}" />
    </div>

    <div class="form-group">
      <label for="location">Location *</label>
      <input type="text" id="location" name="location" required
             value="{{ event.location }}" />
    </div>

    <div class="form-group">
      <label for="date">Date &amp; Time *</label>
      <input type="datetime-local" id="date" name="date" required
             value="{{ event.date }}" />
    </div>

    <div class="form-group">
      <label for="tags">Tags</label>
      <input type="text" id="tags" name="tags"
             value="{{ event.tags | join(', ') }}" />
      <small class="hint">Separate tags with commas</small>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description">{{ event.description }}</textarea>
    </div>

    <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
    <a href="{{ url_for('main.event_detail', id=event._id) }}" class="btn btn-ghost btn-block">Cancel</a>
  </form>
</div>
{% endblock %}
